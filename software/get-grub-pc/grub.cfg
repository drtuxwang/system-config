set default=0
set timeout=10
set superusers=""

menuentry "Debian Live XX.XX-YYYYMMDD [EFI|Live]" --unrestricted {
    linux /vmlinuz boot=live noresume
    initrd /initrd.img
}

menuentry "Debian Live XX.XX-YYYYMMDD [EFI|Live|SafeMode]" --unrestricted {
    linux /vmlinuz boot=live noresume nomodeset
    initrd /initrd.img
}

menuentry "Debian Live XX.XX-rYYYYMMDD [EFI|Live|Recovery]" --unrestricted {
    linux /vmlinuz boot=live noresume nomodeset 3
    initrd /initrd.img
}

